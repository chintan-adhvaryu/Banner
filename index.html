<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Universal Remote</title>
  <style>
    body{font-family:sans-serif; text-align:center; padding:15px; background:#0b0e14; color:#eee;}
    .card{background:#1c1f26; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.3);}
    .btn{display:inline-block; padding:12px; margin:4px; color:white; text-decoration:none; border-radius:8px; border:none; cursor:pointer; font-weight:bold; min-width:80px; font-size:12px; transition: 0.2s;}
    .btn:active{transform: scale(0.95);}
    .btn-earth{background:#2e7d32;} .btn-theia{background:#e65100;} .btn-moon{background:#9e9e9e; color:black;}
    .btn-blue{background:#007bff;} .btn-red{background:#dc3545;} .btn-gray{background:#444;} .btn-green{background:#28a745; width:90%; font-size:16px;}
    .btn-purple{background:#6f42c1; width:90%; font-size:16px; margin-top:10px;}
    input[type='text'], input[type='password'], input[type='range'], select{width:90%; margin:10px 0; padding:10px; border-radius:5px; background:#222; color:#fff; border:1px solid #555;}
    label{font-size:0.8em; color:#888; display:block; margin-top:10px;}
    h3{margin:5px 0 15px 0; color:#007bff; border-bottom: 1px solid #333; padding-bottom: 5px;}
    .toggle-container {display: flex; align-items: center; justify-content: center; margin-top: 15px; background:#222; padding:10px; border-radius:8px;}
    .switch {position: relative; display: inline-block; width: 50px; height: 24px; margin-right: 10px;}
    .switch input {opacity: 0; width: 0; height: 0;}
    .slider {position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px;}
    .slider:before {position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;}
    input:checked + .slider {background-color: #6f42c1;}
    input:checked + .slider:before {transform: translateX(26px);}
  </style>
</head>
<body>

  <h2>Cosmos Universal Dashboard</h2>
  
  <div class="card">
    <button id="connectBtn" class="btn btn-green" onclick="connectBLE()">CONNECT LOCALLY (BLUETOOTH)</button>
    <p id="status" style="color:#aaa; font-size:0.85em; margin-top:10px;">BLE Status: Disconnected</p>
    
    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="cloudToggle" onchange="toggleCloudMode()">
        <span class="slider"></span>
      </label>
      <span style="font-weight:bold; color:#fff;">Use from anywhere in the world?</span>
    </div>
    
    <div id="cloudSettings" style="display:none; margin-top:10px;">
      <p style="color:#00ff00; font-size:0.85em; font-weight:bold;">Cloud Mode Active! You are now controlling it over the internet.</p>
    </div>
  </div>

  <div class="card" id="wifiCard">
    <h3>Network Setup (Do this via Bluetooth first)</h3>
    <button class="btn btn-blue" onclick="scanWiFi()">1. SCAN FOR WIFI NETWORKS</button>
    <p id="wifiStatus" style="color:#aaa; font-size:0.85em; margin:8px 0;">Waiting to scan...</p>
    <select id="wifiSelect"><option value="">No networks scanned yet</option></select>
    <input type="password" id="wifiPass" placeholder="WiFi Password">
    <br><button class="btn btn-gray" onclick="connectWiFi()">2. CONNECT ESP32 TO WIFI</button>
  </div>

  <div class="card">
    <h3>Presets</h3>
    <button class="btn btn-earth" onclick="sendCmd('MODE:earth1')">EARTH-1</button>
    <button class="btn btn-theia" onclick="sendCmd('MODE:theia')">THEIA</button>
    <button class="btn btn-earth" onclick="sendCmd('MODE:earth2')">EARTH-2</button>
    <button class="btn btn-moon" onclick="sendCmd('MODE:moon')">MOON</button>
  </div>

  <div class="card">
    <h3>Matrix Control</h3>
    <input type="text" id="customMsg" placeholder="Custom text...">
    <br><button class="btn btn-blue" onclick="sendText()">WRITE TEXT</button><br>
    
    <label>Alignment:</label> 
    <button class="btn btn-gray" onclick="sendCmd('ALIGN:L')">LEFT</button>
    <button class="btn btn-gray" onclick="sendCmd('ALIGN:C')">CENTER</button>
    <button class="btn btn-gray" onclick="sendCmd('ALIGN:R')">RIGHT</button>
    
    <label>Movement:</label> 
    <button class="btn btn-gray" onclick="sendCmd('EFFECT:scroll')">SCROLL</button>
    <button class="btn btn-gray" onclick="sendCmd('EFFECT:static')">STATIC</button>

    <label>Scroll Speed (Lower = Faster)</label>
    <input type="range" min="10" max="150" value="70" onchange="sendCmd('MSPEED:' + this.value)">
    
    <label>Matrix Brightness</label>
    <input type="range" min="0" max="15" value="2" onchange="sendCmd('MBRIGHT:' + this.value)">
    <br><button class="btn btn-red" style="margin-top:15px;" onclick="sendCmd('MOFF')">TURN OFF MATRIX</button>
  </div>

  <div class="card">
    <h3>LED Ambient Control</h3>
    <button class="btn btn-blue" onclick="sendCmd('MODE:rainbow')">RAINBOW MODE</button>
    <label>Effect Speed</label>
    <input type="range" min="1" max="100" value="30" onchange="sendCmd('LSPEED:' + this.value)">
    <label>LED Brightness</label>
    <input type="range" min="0" max="255" value="80" onchange="sendCmd('LBRIGHT:' + this.value)">
    <br><button class="btn btn-red" style="margin-top:15px;" onclick="sendCmd('LOFF')">TURN OFF LEDS</button>
  </div>

  <script>
    var bleDevice, bleServer, bleService, rxCharacteristic, txCharacteristic;
    const serviceUUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const rxUUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    const txUUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
    
    // Hardcoded Blynk Token
    const blynkToken = "NvppwfZxvlO_oqnhEJ1RpzS09707n6XB";

    function toggleCloudMode() {
      let isCloud = document.getElementById("cloudToggle").checked;
      if (isCloud) {
        document.getElementById("cloudSettings").style.display = "block";
        document.getElementById("wifiCard").style.opacity = "0.3"; 
      } else {
        document.getElementById("cloudSettings").style.display = "none";
        document.getElementById("wifiCard").style.opacity = "1.0";
      }
    }

    async function sendToBlynkCloud(pin, value) {
      let url = `https://blynk.cloud/external/api/update?token=${blynkToken}&${pin}=${value}`;
      try {
        await fetch(url);
        console.log("Sent to Cloud: " + url);
      } catch(e) { console.error("Cloud Error: " + e); }
    }

    async function sendCmd(cmd) {
      let isCloud = document.getElementById("cloudToggle").checked;

      // --- CLOUD ROUTING ---
      if (isCloud) {
        if (cmd.startsWith("MSG:")) sendToBlynkCloud("V0", encodeURIComponent(cmd.substring(4)));
        else if (cmd === "ALIGN:L") sendToBlynkCloud("V1", 1);
        else if (cmd === "ALIGN:C") sendToBlynkCloud("V1", 2);
        else if (cmd === "ALIGN:R") sendToBlynkCloud("V1", 3);
        else if (cmd === "EFFECT:scroll") sendToBlynkCloud("V2", 1);
        else if (cmd === "EFFECT:static") sendToBlynkCloud("V2", 2);
        else if (cmd.startsWith("MSPEED:")) sendToBlynkCloud("V3", cmd.substring(7));
        else if (cmd.startsWith("MBRIGHT:")) sendToBlynkCloud("V4", cmd.substring(8));
        else if (cmd === "MODE:rainbow") sendToBlynkCloud("V5", 1);
        else if (cmd === "MODE:earth1") sendToBlynkCloud("V5", 2);
        else if (cmd === "MODE:theia") sendToBlynkCloud("V5", 3);
        else if (cmd === "MODE:earth2") sendToBlynkCloud("V5", 4);
        else if (cmd === "MODE:moon") sendToBlynkCloud("V5", 5);
        else if (cmd.startsWith("LSPEED:")) sendToBlynkCloud("V6", cmd.substring(7));
        else if (cmd.startsWith("LBRIGHT:")) sendToBlynkCloud("V7", cmd.substring(8));
        
        if (cmd === "MOFF") sendToBlynkCloud("V4", 0); 
        if (cmd === "LOFF") sendToBlynkCloud("V7", 0);
        return;
      }

      // --- BLUETOOTH ROUTING ---
      if (!rxCharacteristic) { alert("Connect to Bluetooth OR turn on Cloud Mode!"); return; }
      let encoder = new TextEncoder();
      await rxCharacteristic.writeValue(encoder.encode(cmd));
    }

    function sendText() {
      let text = document.getElementById("customMsg").value;
      if(text) sendCmd("MSG:" + text);
    }

    // --- BLE Connection Logic ---
    async function connectBLE() {
      try {
        bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Cosmos Matrix' }], optionalServices: [serviceUUID] });
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        bleServer = await bleDevice.gatt.connect();
        bleService = await bleServer.getPrimaryService(serviceUUID);
        rxCharacteristic = await bleService.getCharacteristic(rxUUID);
        txCharacteristic = await bleService.getCharacteristic(txUUID);
        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);
        
        document.getElementById('status').innerText = "BLE Status: Connected!";
        document.getElementById('status').style.color = "lime";
      } catch (error) { document.getElementById('status').innerText = "Error: " + error; }
    }

    function onDisconnected() { document.getElementById('status').innerText = "BLE Status: Disconnected"; document.getElementById('status').style.color = "red"; }

    function handleNotifications(event) {
      let value = new TextDecoder().decode(event.target.value);
      let wifiStatus = document.getElementById("wifiStatus");
      if (value.startsWith("NET:")) {
        let ssid = value.substring(4);
        let option = document.createElement("option"); option.text = ssid; option.value = ssid;
        document.getElementById("wifiSelect").add(option);
      } 
      else if (value === "NET_END") wifiStatus.innerText = "Scan complete. Select your network below.";
      else if (value === "WIFI_OK") wifiStatus.innerText = "Success! ESP32 is online. You can now use Cloud Mode.";
      else if (value === "WIFI_FAIL") wifiStatus.innerText = "Connection Failed.";
    }

    function scanWiFi() { sendCmd("SCAN"); document.getElementById("wifiSelect").options.length = 0; document.getElementById("wifiStatus").innerText = "Scanning..."; }
    function connectWiFi() {
      let ssid = document.getElementById("wifiSelect").value;
      let pass = document.getElementById("wifiPass").value;
      if (ssid) { document.getElementById("wifiStatus").innerText = "Connecting..."; sendCmd("WIFI:" + ssid + ":" + pass); }
    }
  </script>
</body>
</html>
